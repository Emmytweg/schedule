<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Recognition Scheduler</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
}

.week{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:left;
}

th{
background:black;
color:white;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.next{
background:red;
color:white;
}

.print{
background:black;
color:white;
}

@media print{

button{
display:none;
}

body{
background:white;
}

.container{
box-shadow:none;
}

}

</style>

</head>
<body>

<div class="container">

<h1>Faculty Recognition Weekly Schedule</h1>

<div class="week" id="weekDisplay"></div>

<table>

<thead>
<tr>
<th>Category</th>
<th>Department Responsible</th>
</tr>
</thead>

<tbody id="scheduleTable"></tbody>

</table>

<div class="buttons">

<button class="next" onclick="nextWeek()">Next Week</button>

<button class="print" onclick="printSchedule()">Print Schedule</button>

</div>

<script>

const departments = [
"Agricultural & Environmental Engineering",
"Civil Engineering",
"Electrical & Electronics Engineering",
"Industrial Production Engineering",
"Petroleum Engineering",
"Automotive Engineering",
"Mechanical Engineering",
"Food Technology",
"Wood and Biomaterial Engineering"
]

const categories = [
"Fresher of the Week",
"Staylite of the Week",
"Creative of the Week",
"Scholar of the Week",
"Executive of the Week",
"Student Leader of the Week",
"Sportsman of the Week",
"Finalist of the Week"
]

let week = 0

// tomorrow = starting week
const startDate = new Date()
startDate.setDate(startDate.getDate() + 1)

function formatDate(date){
return date.toLocaleDateString("en-US",{
month:"short",
day:"numeric",
year:"numeric"
})
}

// Seeded random for consistent weekly randomization
function seededRandom(seed){
const x = Math.sin(seed) * 10000
return x - Math.floor(x)
}

function getWeekKey(date){
const year = date.getFullYear()
const month = date.getMonth()
const dayOfYear = Math.floor((date - new Date(year, 0, 0)) / 86400000)
const weekOfYear = Math.floor(dayOfYear / 7)
return year * 10000 + weekOfYear
}

function getShuffledDepts(date){
const weekKey = getWeekKey(date)
const deptsCopy = [...departments]

// Shuffle using seeded random based on week
for(let i = deptsCopy.length - 1; i > 0; i--){
const j = Math.floor(seededRandom(weekKey + i) * (i + 1));
[deptsCopy[i], deptsCopy[j]] = [deptsCopy[j], deptsCopy[i]]
}

return deptsCopy
}

function generateSchedule(){

const table = document.getElementById("scheduleTable")
table.innerHTML=""

// Get the date for this week
let weekStart = new Date(startDate)
weekStart.setDate(startDate.getDate() + (week * 7))

// Get shuffled departments for this week
const shuffledDepts = getShuffledDepts(weekStart)

// Rotate which 7 categories show this week
const weeklyCategoriesOffset = week % categories.length
const weeklyCategories = []
for(let i = 0; i < 7; i++){
weeklyCategories.push(categories[(weeklyCategoriesOffset + i) % categories.length])
}

weeklyCategories.forEach((category,index)=>{

const dept = shuffledDepts[index]

const row = `
<tr>
<td>${category}</td>
<td>${dept}</td>
</tr>
`

table.innerHTML += row

})

let weekEnd = new Date(weekStart)
weekEnd.setDate(weekStart.getDate() + 6)

document.getElementById("weekDisplay").innerText =
`Week ${week + 1} — ${formatDate(weekStart)} to ${formatDate(weekEnd)}`

}

function nextWeek(){

week++
generateSchedule()

}

function printSchedule(){

window.print()

}

generateSchedule()

</script>
</body>
</html>
