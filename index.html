<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Recognition Scheduler</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
}

.week{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:left;
}

th{
background:black;
color:white;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.next{background:red;color:white;}
.print{background:black;color:white;}
.share{background:#25D366;color:white;}

@media print{
button{display:none;}
body{background:white;}
.container{box-shadow:none;}
}
</style>

</head>
<body>

<div class="container">

<h1>Faculty Recognition Weekly Schedule</h1>

<div class="week" id="weekDisplay"></div>

<table>
<thead>
<tr>
<th>Department</th>
<th>Recognition Category</th>
</tr>
</thead>
<tbody id="scheduleTable"></tbody>
</table>

<div class="buttons">
<button class="next" onclick="nextWeek()">Next Week</button>
<button class="print" onclick="printSchedule()">Print Schedule</button>
<button class="share" onclick="shareWhatsApp()">Share on WhatsApp</button>
</div>

</div>

<script>

const departments = [
"Agricultural & Environmental Engineering",
"Civil Engineering",
"Electrical & Electronics Engineering",
"Industrial Production Engineering",
"Petroleum Engineering",
"Automotive Engineering",
"Mechanical Engineering",
"Food Technology",
"Wood and Biomaterial Engineering"
]

const categories = [
"Fresher of the Week",
"Staylite of the Week",
"Creative of the Week",
"Scholar of the Week",
"Student Leader of the Week",
"Sportsman of the Week",
"Finalist of the Week",
"Techipreneur of the Week"
]

let week = 0

const startDate = new Date()
startDate.setDate(startDate.getDate() + 1)

function formatDate(date){
return date.toLocaleDateString("en-US",{
month:"short",
day:"numeric",
year:"numeric"
})
}

function generateSchedule(){

const table = document.getElementById("scheduleTable")
table.innerHTML=""

departments.forEach((dept,index)=>{

const category = categories[(index + week) % categories.length]

const row = `
<tr>
<td>${dept}</td>
<td>${category}</td>
</tr>
`

table.innerHTML += row

})

let weekStart = new Date(startDate)
weekStart.setDate(startDate.getDate() + (week * 7))

let weekEnd = new Date(weekStart)
weekEnd.setDate(weekStart.getDate() + 6)

document.getElementById("weekDisplay").innerText =
`Week ${week + 1} — ${formatDate(weekStart)} to ${formatDate(weekEnd)}`

}

function nextWeek(){
week++
generateSchedule()
}

function printSchedule(){
window.print()
}

function buildWhatsAppMessage(){
let message = "*Faculty Recognition Weekly Schedule*%0A%0A"

let weekText = document.getElementById("weekDisplay").innerText
message += "*" + weekText + "*%0A%0A"

departments.forEach((dept,index)=>{

const category = categories[(index + week) % categories.length]

message += "• " + dept + " — " + category + "%0A"

})

return message
}

function shareWhatsApp(){

const message = buildWhatsAppMessage()

const url = "https://wa.me/?text=" + message

window.open(url,"_blank")

}

generateSchedule()

</script>

</body>
</html>
